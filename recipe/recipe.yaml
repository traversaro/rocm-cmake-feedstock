schema_version: 1

context:
  name: rocm-cmake
  version: "7.2.4"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/ROCm/rocm-cmake/archive/refs/tags/rocm-${{ version }}.tar.gz
  sha256: e7a28cb4baf8afbc21204d37e132dae7e12b2d980a2600948fe35cc4d8ac8087

build:
  number: 0
  skip: not linux

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - cmake
    - make
  host:
    - rocm-core ${{ version }}.*
  run:

tests:
  - script:
      - test -f $PREFIX/share/rocm/cmake/ROCMConfig.cmake

about:
  license: MIT
  license_file: LICENSE
  summary: Rocm cmake modules
  homepage: https://github.com/ROCm/rocm-cmake

extra:
  recipe-maintainers:
    - isuruf
    - conda-forge/rocm-core
